<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Svenska — Vocabulary Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4ede0;
    --bg-deep: #ebe1cf;
    --ink: #1f1d1a;
    --ink-soft: #4a453d;
    --ink-faint: #8a8275;
    --accent: #c8441f;
    --accent-deep: #9e3318;
    --good: #2d6a3f;
    --bad: #c8441f;
    --card: #fbf7ee;
    --card-shadow: rgba(31, 29, 26, 0.12);
    --line: rgba(31, 29, 26, 0.12);
    --line-strong: rgba(31, 29, 26, 0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 30%, rgba(200, 68, 31, 0.04) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(45, 106, 63, 0.04) 0%, transparent 40%);
    padding: 24px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .app {
    max-width: 640px;
    margin: 0 auto;
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* HEADER */
  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.02em;
    font-style: italic;
  }
  .logo::after {
    content: "·";
    color: var(--accent);
    margin: 0 8px;
  }
  .logo span {
    font-style: normal;
    font-weight: 400;
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: 0;
  }

  .stats {
    display: flex;
    gap: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .stats b {
    color: var(--ink);
    font-weight: 500;
  }

  /* CATEGORY FILTER */
  .filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .chip {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 12px;
    border: 1px solid var(--line-strong);
    background: transparent;
    color: var(--ink-soft);
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .chip:hover { background: var(--bg-deep); color: var(--ink); }
  .chip.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  /* CARD STACK */
  .stack {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 380px;
    padding: 20px 0;
  }

  .card {
    position: absolute;
    width: 100%;
    max-width: 500px;
    height: 340px;
    background: var(--card);
    border-radius: 16px;
    box-shadow:
      0 1px 2px var(--card-shadow),
      0 8px 24px rgba(31, 29, 26, 0.08),
      0 24px 48px rgba(31, 29, 26, 0.04);
    cursor: grab;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 32px;
    user-select: none;
    transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.3, 1),
                opacity 0.3s ease,
                box-shadow 0.2s ease;
    border: 1px solid var(--line);
    overflow: hidden;
  }
  .card:active { cursor: grabbing; }

  /* Stacked cards behind the top */
  .card.behind-1 { transform: scale(0.96) translateY(12px); z-index: 1; opacity: 0.6; pointer-events: none; }
  .card.behind-2 { transform: scale(0.92) translateY(24px); z-index: 0; opacity: 0.3; pointer-events: none; }
  .card.top { z-index: 2; }

  .card .category-tag {
    position: absolute;
    top: 20px;
    left: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
  }

  .card .box-tag {
    position: absolute;
    top: 20px;
    right: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
  }
  .card .box-tag .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--line-strong);
    margin-right: 2px;
  }
  .card .box-tag .dot.filled { background: var(--accent); }

  .card .swedish {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(32px, 6vw, 52px);
    letter-spacing: -0.02em;
    text-align: center;
    line-height: 1.1;
    color: var(--ink);
  }

  .card .english {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 24px;
    color: var(--accent-deep);
    margin-top: 20px;
    text-align: center;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .card.revealed .english {
    opacity: 1;
    transform: translateY(0);
  }

  .card .reveal-hint {
    position: absolute;
    bottom: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.7;
  }
  .card.revealed .reveal-hint { display: none; }

  /* Swipe direction indicators */
  .card .verdict {
    position: absolute;
    top: 50%;
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 40px;
    font-style: italic;
    padding: 8px 20px;
    border: 3px solid currentColor;
    border-radius: 10px;
    opacity: 0;
    transition: opacity 0.1s ease;
    pointer-events: none;
  }
  .card .verdict.knew {
    right: 32px;
    color: var(--good);
    transform: translateY(-50%) rotate(12deg);
  }
  .card .verdict.missed {
    left: 32px;
    color: var(--bad);
    transform: translateY(-50%) rotate(-12deg);
  }

  /* ACTION BUTTONS */
  .actions {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 4px 0 12px;
  }

  .btn {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 14px 28px;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0.01em;
  }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-missed {
    background: transparent;
    color: var(--bad);
    border: 2px solid var(--bad);
  }
  .btn-missed:hover:not(:disabled) { background: var(--bad); color: white; }

  .btn-reveal {
    background: var(--ink);
    color: var(--bg);
    padding: 14px 32px;
  }
  .btn-reveal:hover:not(:disabled) { background: var(--accent); }

  .btn-knew {
    background: var(--good);
    color: white;
    border: 2px solid var(--good);
  }
  .btn-knew:hover:not(:disabled) { background: #1e4c2d; border-color: #1e4c2d; }

  .keyboard-hint {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding-bottom: 8px;
  }
  .keyboard-hint kbd {
    background: var(--bg-deep);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 1px 6px;
    font-family: inherit;
    font-size: 10px;
    margin: 0 2px;
    color: var(--ink);
  }

  /* TOOLS BAR */
  .tools {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    font-size: 12px;
  }
  .tool-btn {
    background: none;
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    text-decoration: underline;
    text-decoration-color: var(--line-strong);
    text-underline-offset: 3px;
    transition: color 0.15s;
  }
  .tool-btn:hover { color: var(--accent); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--ink-soft);
  }
  .empty-state h2 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 32px;
    margin-bottom: 8px;
    color: var(--ink);
  }
  .empty-state p { font-size: 14px; }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(31, 29, 26, 0.5);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--card);
    border-radius: 12px;
    max-width: 600px;
    width: 100%;
    max-height: 80vh;
    overflow: auto;
    padding: 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .modal h2 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 24px;
    margin-bottom: 16px;
  }

  .modal p, .modal li { font-size: 14px; color: var(--ink-soft); line-height: 1.6; }
  .modal p { margin-bottom: 12px; }
  .modal ul, .modal ol { padding-left: 20px; margin-bottom: 12px; }

  .modal code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: var(--bg-deep);
    padding: 2px 6px;
    border-radius: 3px;
  }
  .modal pre {
    background: var(--bg-deep);
    padding: 12px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    overflow-x: auto;
    margin: 12px 0;
    white-space: pre-wrap;
    max-height: 200px;
  }

  .modal textarea {
    width: 100%;
    min-height: 200px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 12px;
    border: 1px solid var(--line-strong);
    border-radius: 6px;
    background: var(--bg);
    color: var(--ink);
    resize: vertical;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    justify-content: flex-end;
  }
  .modal-actions button {
    padding: 10px 20px;
    border-radius: 6px;
    border: 1px solid var(--line-strong);
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
  }
  .modal-actions button.primary {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--bg);
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 1000;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

  @media (max-width: 500px) {
    html, body { overflow: auto; height: auto; }
    body { padding: 16px; }
    .card { padding: 32px 24px; height: 300px; }
    .btn { padding: 12px 20px; font-size: 13px; }
    .actions { gap: 10px; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">Svenska<span>vocabulary practice</span></div>
    <div class="stats">
      <span>Due: <b id="stat-due">0</b></span>
      <span>Learned: <b id="stat-learned">0</b></span>
      <span>Total: <b id="stat-total">0</b></span>
    </div>
  </header>

  <div class="filter-row" id="filter-row"></div>

  <div class="stack" id="stack"></div>

  <div class="actions">
    <button class="btn btn-missed" id="btn-missed" disabled>
      ← Didn't know
    </button>
    <button class="btn btn-reveal" id="btn-reveal">
      Reveal ↓
    </button>
    <button class="btn btn-knew" id="btn-knew" disabled>
      Knew it →
    </button>
  </div>

  <div class="keyboard-hint">
    <kbd>Space</kbd> reveal  ·  <kbd>←</kbd> missed  ·  <kbd>→</kbd> knew it
  </div>

  <div class="tools">
    <div>
      <button class="tool-btn" id="btn-add">+ Add words</button>
      &nbsp;&nbsp;
      <button class="tool-btn" id="btn-export">Export progress</button>
      &nbsp;&nbsp;
      <button class="tool-btn" id="btn-import">Import progress</button>
    </div>
    <div>
      <button class="tool-btn" id="btn-reset">Reset progress</button>
      &nbsp;&nbsp;
      <button class="tool-btn" id="btn-help">Help</button>
    </div>
  </div>

</div>

<!-- MODALS -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================================
// SPACED REPETITION ENGINE (simplified Leitner)
// ============================================================================
// Each card has:
//   box: 0..5 (0 = new, 5 = mastered)
//   streak: consecutive correct answers
//   nextReview: timestamp (ms)
//   totalSeen, totalCorrect: stats
//
// Intervals per box (after correct answer):
const INTERVALS_MS = {
  0: 0,                              // new / just wrong: review immediately
  1: 10 * 60 * 1000,                 // 10 min
  2: 1 * 24 * 60 * 60 * 1000,        // 1 day
  3: 3 * 24 * 60 * 60 * 1000,        // 3 days
  4: 7 * 24 * 60 * 60 * 1000,        // 7 days
  5: 30 * 24 * 60 * 60 * 1000,       // 30 days (essentially mastered)
};

const MASTERY_STREAK = 3;  // 3 in a row = mastered (user's choice)

// ============================================================================
// STATE
// ============================================================================
const STORAGE_KEY = 'svenska-vocab-progress-v1';
let vocabulary = [];
let progress = {};      // { cardId: { box, streak, nextReview, totalSeen, totalCorrect } }
let currentCategory = 'all';
let queue = [];         // Cards due for review, in order
let currentIdx = 0;
let isRevealed = false;

// ============================================================================
// VOCABULARY LOADING
// ============================================================================
async function loadVocabulary() {
  try {
    const res = await fetch('vocabulary.json');
    if (!res.ok) throw new Error('Failed to load vocabulary.json');
    const data = await res.json();
    vocabulary = data.cards.map((c, i) => ({
      ...c,
      id: c.id || `${c.swedish}::${c.english}`
    }));
  } catch (e) {
    console.error(e);
    // Fallback if running without a server
    showToast('Could not load vocabulary.json — see Help');
    vocabulary = [];
  }
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) progress = JSON.parse(raw);
  } catch (e) { progress = {}; }
}

function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  } catch (e) { console.error('Could not save progress', e); }
}

function getCardState(card) {
  if (!progress[card.id]) {
    progress[card.id] = {
      box: 0,
      streak: 0,
      nextReview: 0,   // epoch 0 = due now
      totalSeen: 0,
      totalCorrect: 0
    };
  }
  return progress[card.id];
}

// ============================================================================
// QUEUE BUILDING
// ============================================================================
function buildQueue() {
  const now = Date.now();
  const pool = vocabulary.filter(c =>
    currentCategory === 'all' || c.category === currentCategory
  );

  // Split into: due cards, new cards, then others by next review time
  const due = [];
  const newCards = [];
  const future = [];

  for (const card of pool) {
    const s = getCardState(card);
    if (s.streak >= MASTERY_STREAK) continue;  // mastered, skip
    if (s.totalSeen === 0) newCards.push(card);
    else if (s.nextReview <= now) due.push(card);
    else future.push(card);
  }

  // Due first (already reviewed, now ready again), then new, then soonest future
  due.sort((a, b) => getCardState(a).nextReview - getCardState(b).nextReview);
  future.sort((a, b) => getCardState(a).nextReview - getCardState(b).nextReview);
  shuffle(newCards);

  // Limit to a reasonable session: all due + up to 10 new + some future to pad
  queue = [...due, ...newCards.slice(0, 10)];
  if (queue.length === 0) queue = future.slice(0, 5);

  currentIdx = 0;
  isRevealed = false;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ============================================================================
// RECORDING ANSWERS
// ============================================================================
function recordAnswer(card, correct) {
  const s = getCardState(card);
  s.totalSeen++;
  const now = Date.now();

  if (correct) {
    s.totalCorrect++;
    s.streak++;
    s.box = Math.min(5, s.box + 1);
  } else {
    s.streak = 0;
    s.box = Math.max(0, Math.floor(s.box / 2));  // drop back
  }

  s.nextReview = now + (INTERVALS_MS[s.box] || 0);
  saveProgress();
}

// ============================================================================
// RENDERING
// ============================================================================
function renderStats() {
  const total = vocabulary.length;
  const learned = vocabulary.filter(c => {
    const s = progress[c.id];
    return s && s.streak >= MASTERY_STREAK;
  }).length;
  const now = Date.now();
  const due = vocabulary.filter(c => {
    const s = progress[c.id];
    if (s && s.streak >= MASTERY_STREAK) return false;
    return !s || s.nextReview <= now;
  }).length;

  document.getElementById('stat-due').textContent = due;
  document.getElementById('stat-learned').textContent = learned;
  document.getElementById('stat-total').textContent = total;
}

function renderFilters() {
  const categories = [...new Set(vocabulary.map(c => c.category))].sort();
  const container = document.getElementById('filter-row');
  container.innerHTML = '';

  const all = document.createElement('button');
  all.className = 'chip' + (currentCategory === 'all' ? ' active' : '');
  all.textContent = 'All';
  all.onclick = () => { currentCategory = 'all'; buildQueue(); renderAll(); };
  container.appendChild(all);

  for (const cat of categories) {
    const btn = document.createElement('button');
    btn.className = 'chip' + (currentCategory === cat ? ' active' : '');
    btn.textContent = cat.replace(/-/g, ' ');
    btn.onclick = () => { currentCategory = cat; buildQueue(); renderAll(); };
    container.appendChild(btn);
  }
}

function renderCard(card, position /* 'top' | 'behind-1' | 'behind-2' */) {
  const state = getCardState(card);
  const dots = [];
  for (let i = 1; i <= 5; i++) {
    dots.push(`<span class="dot ${i <= state.box ? 'filled' : ''}"></span>`);
  }

  const el = document.createElement('div');
  el.className = `card ${position}` + (position === 'top' && isRevealed ? ' revealed' : '');
  el.dataset.cardId = card.id;
  el.innerHTML = `
    <div class="category-tag">${card.category.replace(/-/g, ' ')}</div>
    <div class="box-tag">${dots.join('')}</div>
    <div class="swedish">${escapeHtml(card.swedish)}</div>
    <div class="english">${escapeHtml(card.english)}</div>
    <div class="reveal-hint">Tap or press space</div>
    <div class="verdict knew">KNEW</div>
    <div class="verdict missed">MISS</div>
  `;
  return el;
}

function renderStack() {
  const stack = document.getElementById('stack');
  stack.innerHTML = '';

  if (queue.length === 0 || currentIdx >= queue.length) {
    stack.innerHTML = `
      <div class="empty-state">
        <h2>Bra jobbat!</h2>
        <p>No cards due right now. Come back later, switch category,<br>or add more words.</p>
      </div>
    `;
    document.getElementById('btn-reveal').disabled = true;
    document.getElementById('btn-missed').disabled = true;
    document.getElementById('btn-knew').disabled = true;
    return;
  }

  // Render up to 3 stacked cards (top + 2 behind)
  const topCard = queue[currentIdx];
  if (currentIdx + 2 < queue.length) stack.appendChild(renderCard(queue[currentIdx + 2], 'behind-2'));
  if (currentIdx + 1 < queue.length) stack.appendChild(renderCard(queue[currentIdx + 1], 'behind-1'));
  const topEl = renderCard(topCard, 'top');
  stack.appendChild(topEl);

  // Attach interactions to top card
  attachCardInteractions(topEl, topCard);

  // Update buttons
  document.getElementById('btn-reveal').disabled = isRevealed;
  document.getElementById('btn-reveal').textContent = isRevealed ? 'Revealed' : 'Reveal ↓';
  document.getElementById('btn-missed').disabled = !isRevealed;
  document.getElementById('btn-knew').disabled = !isRevealed;
}

function renderAll() {
  renderStats();
  renderFilters();
  renderStack();
}

// ============================================================================
// CARD INTERACTIONS (swipe / tap)
// ============================================================================
function attachCardInteractions(el, card) {
  let startX = 0, startY = 0, currentX = 0, currentY = 0;
  let dragging = false;

  const knewVerdict = el.querySelector('.verdict.knew');
  const missVerdict = el.querySelector('.verdict.missed');

  function onPointerDown(e) {
    if (!isRevealed) return; // can't swipe before reveal
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    el.style.transition = 'none';
    el.setPointerCapture(e.pointerId);
  }

  function onPointerMove(e) {
    if (!dragging) return;
    currentX = e.clientX - startX;
    currentY = e.clientY - startY;
    const rotation = currentX * 0.06;
    el.style.transform = `translate(${currentX}px, ${currentY * 0.5}px) rotate(${rotation}deg)`;

    const threshold = 60;
    if (currentX > threshold) {
      knewVerdict.style.opacity = Math.min(1, (currentX - threshold) / 60);
      missVerdict.style.opacity = 0;
    } else if (currentX < -threshold) {
      missVerdict.style.opacity = Math.min(1, (-currentX - threshold) / 60);
      knewVerdict.style.opacity = 0;
    } else {
      knewVerdict.style.opacity = 0;
      missVerdict.style.opacity = 0;
    }
  }

  function onPointerUp(e) {
    if (!dragging) return;
    dragging = false;
    el.style.transition = 'transform 0.3s cubic-bezier(0.2, 0.8, 0.3, 1), opacity 0.3s ease';

    const DISMISS_THRESHOLD = 120;
    if (currentX > DISMISS_THRESHOLD) {
      flyOut(el, card, true);
    } else if (currentX < -DISMISS_THRESHOLD) {
      flyOut(el, card, false);
    } else {
      // Snap back
      el.style.transform = '';
      knewVerdict.style.opacity = 0;
      missVerdict.style.opacity = 0;
    }
    currentX = currentY = 0;
  }

  el.addEventListener('pointerdown', onPointerDown);
  el.addEventListener('pointermove', onPointerMove);
  el.addEventListener('pointerup', onPointerUp);
  el.addEventListener('pointercancel', onPointerUp);

  // Tap to reveal
  el.addEventListener('click', (e) => {
    // Only reveal on pure tap (no drag)
    if (Math.abs(currentX) < 5 && !isRevealed) {
      reveal();
    }
  });
}

function flyOut(el, card, correct) {
  const direction = correct ? 1 : -1;
  el.style.transform = `translate(${direction * 800}px, 100px) rotate(${direction * 30}deg)`;
  el.style.opacity = '0';

  recordAnswer(card, correct);

  setTimeout(() => {
    currentIdx++;
    isRevealed = false;
    renderAll();
  }, 300);
}

// ============================================================================
// ACTIONS (button clicks)
// ============================================================================
function reveal() {
  if (isRevealed || queue.length === 0 || currentIdx >= queue.length) return;
  isRevealed = true;
  const topCard = document.querySelector('.card.top');
  if (topCard) topCard.classList.add('revealed');
  document.getElementById('btn-reveal').disabled = true;
  document.getElementById('btn-reveal').textContent = 'Revealed';
  document.getElementById('btn-missed').disabled = false;
  document.getElementById('btn-knew').disabled = false;
}

function answerButton(correct) {
  if (!isRevealed) return;
  const card = queue[currentIdx];
  const topEl = document.querySelector('.card.top');
  if (topEl) {
    flyOut(topEl, card, correct);
  }
}

// ============================================================================
// KEYBOARD
// ============================================================================
document.addEventListener('keydown', (e) => {
  if (document.getElementById('modal-backdrop').classList.contains('open')) return;
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;

  if (e.code === 'Space') { e.preventDefault(); reveal(); }
  else if (e.code === 'ArrowRight' && isRevealed) { e.preventDefault(); answerButton(true); }
  else if (e.code === 'ArrowLeft' && isRevealed) { e.preventDefault(); answerButton(false); }
});

// ============================================================================
// BUTTON BINDINGS
// ============================================================================
document.getElementById('btn-reveal').onclick = reveal;
document.getElementById('btn-missed').onclick = () => answerButton(false);
document.getElementById('btn-knew').onclick = () => answerButton(true);

// ============================================================================
// MODALS
// ============================================================================
function openModal(html) {
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modal-backdrop').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
}
document.getElementById('modal-backdrop').onclick = (e) => {
  if (e.target.id === 'modal-backdrop') closeModal();
};

document.getElementById('btn-help').onclick = () => {
  openModal(`
    <h2>How this works</h2>
    <p><b>Spaced repetition</b> — cards you get right are shown less often; cards you miss come back sooner. Get a card right 3 times in a row and it's marked mastered (dropped from rotation).</p>
    <p><b>Intervals:</b> 10 min → 1 day → 3 days → 7 days → 30 days</p>
    <p><b>Swipe or click:</b></p>
    <ul>
      <li>Tap the card or press <code>Space</code> to reveal the English meaning</li>
      <li>Swipe right / press <code>→</code> / click "Knew it" if you knew it</li>
      <li>Swipe left / press <code>←</code> / click "Didn't know" if you missed it</li>
    </ul>
    <p><b>Adding more words:</b> Click "+ Add words" to paste in new vocabulary, or edit <code>vocabulary.json</code> directly. The JSON format is:</p>
    <pre>{ "swedish": "en bok", "english": "a book", "category": "objects", "lesson": "2026-04-13" }</pre>
    <p><b>Progress storage:</b> Your progress is saved in your browser's localStorage. Use Export/Import to back it up or move between browsers.</p>
    <div class="modal-actions">
      <button class="primary" onclick="closeModal()">Got it</button>
    </div>
  `);
};

document.getElementById('btn-add').onclick = () => {
  openModal(`
    <h2>Add words</h2>
    <p>Paste new vocabulary as JSON array. Each item needs <code>swedish</code>, <code>english</code>, and <code>category</code>.</p>
    <textarea id="add-textarea" placeholder='[
  { "swedish": "en katt", "english": "a cat", "category": "animals" },
  { "swedish": "en hund", "english": "a dog", "category": "animals" }
]'></textarea>
    <p style="margin-top:12px; font-size:12px;">Or ask Claude to format your class notes as JSON in this shape.</p>
    <div class="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" id="add-confirm">Add to session</button>
    </div>
  `);
  document.getElementById('add-confirm').onclick = () => {
    const text = document.getElementById('add-textarea').value.trim();
    try {
      const items = JSON.parse(text);
      if (!Array.isArray(items)) throw new Error('Expected an array');
      let added = 0;
      for (const item of items) {
        if (!item.swedish || !item.english || !item.category) continue;
        const id = `${item.swedish}::${item.english}`;
        if (vocabulary.find(c => c.id === id)) continue;  // skip duplicates
        vocabulary.push({ ...item, id });
        added++;
      }
      closeModal();
      showToast(`Added ${added} new word${added === 1 ? '' : 's'}`);
      buildQueue();
      renderAll();
      // NOTE: these words are only in the current session. To persist,
      // edit vocabulary.json on disk. Help modal explains this.
    } catch (e) {
      alert('Invalid JSON: ' + e.message);
    }
  };
};

document.getElementById('btn-export').onclick = () => {
  const data = { version: 1, progress, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `svenska-progress-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Progress exported');
};

document.getElementById('btn-import').onclick = () => {
  openModal(`
    <h2>Import progress</h2>
    <p>Paste exported progress JSON below:</p>
    <textarea id="import-textarea"></textarea>
    <div class="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" id="import-confirm">Import</button>
    </div>
  `);
  document.getElementById('import-confirm').onclick = () => {
    try {
      const text = document.getElementById('import-textarea').value.trim();
      const data = JSON.parse(text);
      if (!data.progress) throw new Error('Missing progress field');
      progress = data.progress;
      saveProgress();
      closeModal();
      showToast('Progress imported');
      buildQueue();
      renderAll();
    } catch (e) {
      alert('Invalid JSON: ' + e.message);
    }
  };
};

document.getElementById('btn-reset').onclick = () => {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  progress = {};
  saveProgress();
  buildQueue();
  renderAll();
  showToast('Progress reset');
};

// ============================================================================
// UTILITIES
// ============================================================================
function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 2200);
}

// Expose closeModal for inline handlers
window.closeModal = closeModal;

// ============================================================================
// BOOT
// ============================================================================
(async function init() {
  loadProgress();
  await loadVocabulary();
  buildQueue();
  renderAll();
})();
</script>
</body>
</html>
